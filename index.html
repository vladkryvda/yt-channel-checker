<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>channel:// latest uploads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #121212;
    --border: #232323;
    --border-hover: #3a3a3a;
    --text: #e7e4dc;
    --text-dim: #7a776e;
    --text-faint: #4d4b45;
    --accent: #8fb996;
    --accent-dim: #5c7a61;
    --meta: #c9a678;
    --error: #c97878;
    --font: "IBM Plex Mono", ui-monospace, "SF Mono", monospace;
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 64px 24px 80px;
    display: flex;
    justify-content: center;
    line-height: 1.5;
  }

  .wrapper { width: 100%; max-width: 1040px; }

  header {
    margin-bottom: 40px;
  }

  .path {
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.02em;
    margin-bottom: 18px;
  }

  .input-line {
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
    transition: border-color 0.2s ease;
  }

  .input-line:focus-within { border-color: var(--accent-dim); }

  .prompt-glyph { color: var(--accent); font-size: 15px; flex-shrink: 0; }

  #channelUrl {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    caret-color: var(--accent);
  }

  #channelUrl::placeholder { color: var(--text-faint); }

  .echo {
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-dim);
    min-height: 16px;
  }

  .echo .flag { color: var(--meta); }
  .echo.err { color: var(--error); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .card {
    background: var(--bg);
    text-decoration: none;
    color: inherit;
    display: block;
    cursor: pointer;
  }

  .thumb-box {
    position: relative;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: var(--surface);
  }

  .thumb-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(45%) brightness(0.8) contrast(1.02);
    transition: filter 0.25s ease, transform 0.4s ease;
    display: block;
  }

  .card:hover .thumb-box img {
    filter: grayscale(0%) brightness(0.95);
    transform: scale(1.03);
  }

  .date-tag {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 10.5px;
    color: var(--meta);
    background: rgba(10, 10, 10, 0.75);
    padding: 3px 7px;
    letter-spacing: 0.02em;
  }

  .card-body {
    padding: 14px 16px 16px;
    border-top: 1px solid var(--border);
  }

  .card:hover .card-body { border-color: var(--border-hover); }

  .video-title {
    margin: 0;
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.5;
  }

  .prefix { color: var(--accent-dim); margin-right: 6px; }

  .copy-flash {
    position: absolute;
    inset: 0;
    background: rgba(10, 10, 10, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--accent);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
  }

  .card.copied .copy-flash { opacity: 1; }

  .placeholder {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--text-faint);
    font-size: 13px;
    padding: 80px 20px;
    background: var(--bg);
  }

  @media (max-width: 480px) {
    body { padding: 40px 16px 60px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="path">~/channel</div>
    <div class="input-line">
      <span class="prompt-glyph">&gt;</span>
      <input type="text" id="channelUrl" placeholder="@handle or youtube.com/@channel" autocomplete="off" autofocus>
    </div>
    <div class="echo" id="echo"></div>
  </header>

  <div class="grid" id="videoGrid">
    <div class="placeholder">waiting for input</div>
  </div>
</div>

<script>
  // Point this at your own deployed proxy endpoint (see functions/api/videos.js).
  // No API key lives in this file — the key stays server-side.
  const API_ENDPOINT = "/api/videos";

  const inputField = document.getElementById('channelUrl');
  const grid = document.getElementById('videoGrid');
  const echo = document.getElementById('echo');
  let debounceTimer;

  inputField.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const val = inputField.value.trim();

    if (val.length === 0) {
      grid.innerHTML = '<div class="placeholder">waiting for input</div>';
      echo.textContent = '';
      return;
    }

    debounceTimer = setTimeout(() => fetchVideos(val), 500);
  });

  async function fetchVideos(rawInput) {
    echo.className = 'echo';
    echo.innerHTML = `<span class="flag">$</span> fetch --channel="${escapeHtml(rawInput)}" --limit=6`;
    grid.innerHTML = '<div class="placeholder">fetching…</div>';

    try {
      const res = await fetch(`${API_ENDPOINT}?channel=${encodeURIComponent(rawInput)}`);
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'request failed');
      if (!data.videos || data.videos.length === 0) throw new Error('no videos found');

      renderVideos(data.videos);
      echo.innerHTML += `<br><span class="flag">✓</span> ${data.videos.length} results`;
    } catch (err) {
      grid.innerHTML = `<div class="placeholder">${escapeHtml(err.message)}</div>`;
      echo.className = 'echo err';
      echo.innerHTML += `<br>error: ${escapeHtml(err.message)}`;
    }
  }

  function renderVideos(videos) {
    grid.innerHTML = '';
    videos.forEach(video => {
      const url = `https://www.youtube.com/watch?v=${video.id}`;
      const card = document.createElement('a');
      card.className = 'card';
      card.href = url;
      card.target = '_blank';
      card.rel = 'noopener';

      card.innerHTML = `
        <div class="thumb-box">
          <img src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy">
          <span class="date-tag">${escapeHtml(video.date)}</span>
        </div>
        <div class="card-body">
          <p class="video-title"><span class="prefix">&gt;</span>${escapeHtml(video.title)}</p>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
