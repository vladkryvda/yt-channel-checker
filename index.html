<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Video Grabber</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #161616;
            --border-color: #262626;
            --text-primary: #f0f0f0;
            --text-secondary: #8c8c8c;
            --accent-color: #d4b295;
            --success-color: #8fb996;
            --font-mono: "Courier New", Courier, monospace;
        }

        body {
            font-family: var(--font-mono);
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px 140px 20px;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 1200px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            aspect-ratio: 16 / 10;
            border: 1px solid var(--border-color);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), 
                        border-color 0.3s, 
                        box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
        }

        .thumbnail-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .thumbnail-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(65%) grayscale(20%);
            transition: filter 0.3s;
        }

        .card:hover .thumbnail-box img {
            filter: brightness(80%) grayscale(0%);
        }

        .scrim {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.3) 50%, rgba(0, 0, 0, 0.6) 100%);
            z-index: 1;
        }

        .video-title {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            font-size: 0.8rem;
            font-weight: normal;
            margin: 0;
            z-index: 2;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-date {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 0.7rem;
            color: var(--accent-color);
            z-index: 2;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 3px 8px;
            border-radius: 4px;
        }

        .copy-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 15, 15, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--success-color);
            opacity: 0;
            z-index: 3;
            transition: opacity 0.2s;
            text-align: center;
        }

        .card.copied .copy-overlay {
            opacity: 1;
        }

        .input-bar {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 500px;
            z-index: 10;
        }

        .input-bar input[type="text"] {
            width: 100%;
            background-color: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: var(--text-primary);
            padding: 12px 0;
            font-size: 0.9rem;
            font-family: var(--font-mono);
            outline: none;
            text-align: center;
            transition: border-bottom-color 0.3s;
        }

        .input-bar input[type="text"]:focus {
            border-bottom-color: var(--accent-color);
        }

        .placeholder-text {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 100px;
            line-height: 1.8;
            width: 100%;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="grid" id="videoGrid">
            <div class="placeholder-text" id="placeholder">
                [ вставте url каналу в поле знизу ]
            </div>
        </div>
    </div>

    <div class="input-bar">
        <input type="text" id="channelUrl" placeholder="____________________ вставте url каналу тут ____________________" autocomplete="off">
    </div>

    <script>
        const inputField = document.getElementById('channelUrl');
        const grid = document.getElementById('videoGrid');
        let debounceTimer;

        inputField.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const val = inputField.value.trim();
            
            if (val.length === 0) {
                grid.innerHTML = '<div class="placeholder-text">[ вставте url каналу в поле знизу ]</div>';
                return;
            }

            grid.innerHTML = '<div class="placeholder-text">[ ОЧІКУВАННЯ ЗАВЕРШЕННЯ ВВОДУ... ]</div>';
            
            debounceTimer = setTimeout(() => {
                processChannel(val);
            }, 600); // Скорочено час очікування після вводу
        });

        // Функція для вилучення чистого URL з посилань-редиректів Google
        function sanitizeInput(input) {
            let clean = input.trim();
            try {
                if (clean.includes('google.com')) {
                    const urlObj = new URL(clean);
                    const realUrl = urlObj.searchParams.get('url') || urlObj.searchParams.get('q');
                    if (realUrl) {
                        clean = realUrl;
                    }
                }
            } catch (e) {
                // якщо парсинг URL не вдався, залишаємо як є
            }
            return clean;
        }

        async function processChannel(rawInput) {
            const input = sanitizeInput(rawInput);
            grid.innerHTML = '<div class="placeholder-text">[ ПОШУК ID КАНАЛУ... ]</div>';
            
            try {
                const channelId = await getChannelId(input);
                grid.innerHTML = '<div class="placeholder-text">[ ЗАВАНТАЖЕННЯ ВІДЕО... ]</div>';
                
                const videos = await fetchLatestVideos(channelId);
                renderVideos(videos);
            } catch (error) {
                grid.innerHTML = `<div class="placeholder-text" style="color: var(--accent-color)">[ ПОМИЛКА: ${error.message} ]</div>`;
            }
        }

        // Крок 1: Отримання ID за допомогою швидкого проксі corsproxy.io
        async function getChannelId(input) {
            const directIdMatch = input.match(/(UC[a-zA-Z0-9_-]{22})/);
            if (directIdMatch) return directIdMatch[1];

            let targetUrl = input;
            if (input.startsWith('@')) {
                targetUrl = `https://www.youtube.com/${input}`;
            } else if (!input.startsWith('http')) {
                targetUrl = `https://www.youtube.com/@${input}`;
            }

            // Швидкий проксі-сервер corsproxy.io
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
            
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Не вдалося підключитися до швидкого проксі");
            
            const html = await response.text();
            if (!html) throw new Error("Порожня відповідь від сторінки каналу");

            const idPatterns = [
                /"channelId"\s*:\s*"(UC[a-zA-Z0-9_-]{22})"/,
                /itemprop="channelId"\s+content="(UC[a-zA-Z0-9_-]{22})"/,
                /meta\s+property="og:url"\s+content="[^"]*\/channel\/(UC[a-zA-Z0-9_-]{22})"/
            ];

            for (let pattern of idPatterns) {
                const match = html.match(pattern);
                if (match && match[1]) return match[1];
            }

            throw new Error("Не знайдено ID каналу. Переконайтеся, що посилання веде безпосередньо на YouTube.");
        }

        // Крок 2: Отримання та розбір RSS-стрічки через corsproxy.io (майже миттєво)
        async function fetchLatestVideos(channelId) {
            const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(rssUrl)}`;

            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Помилка завантаження стрічки останніх відео");

            const xmlText = await response.text();

            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            const entries = xmlDoc.getElementsByTagName("entry");

            if (entries.length === 0) throw new Error("На каналі немає опублікованих відео");

            const videos = [];
            const limit = Math.min(entries.length, 6);

            for (let i = 0; i < limit; i++) {
                const entry = entries[i];
                const videoId = entry.getElementsByTagName("yt:videoId")[0]?.textContent;
                const title = entry.getElementsByTagName("title")[0]?.textContent;
                const published = entry.getElementsByTagName("published")[0]?.textContent;

                if (videoId && title) {
                    videos.push({
                        id: videoId,
                        title: `> ${title}`,
                        thumbnail: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
                        date: `[ ${formatDate(published)} ]`
                    });
                }
            }

            return videos;
        }

        function formatDate(isoString) {
            if (!isoString) return "unknown";
            const date = new Date(isoString);
            return date.toLocaleDateString('uk-UA', { day: 'numeric', month: 'short' });
        }

        function renderVideos(videos) {
            grid.innerHTML = '';

            videos.forEach(video => {
                const videoUrl = `https://www.youtube.com/watch?v=${video.id}`;
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => copyToClipboard(videoUrl, card);

                card.innerHTML = `
                    <div class="copy-overlay">
                        +----------------------+<br>
                        |    [ COPIED URL ]    |<br>
                        +----------------------+
                    </div>
                    <div class="thumbnail-box">
                        <img src="${video.thumbnail}" alt="${video.title}">
                        <div class="scrim"></div>
                    </div>
                    <div class="video-date">${video.date}</div>
                    <h3 class="video-title">${video.title}</h3>
                `;
                grid.appendChild(card);
            });
        }

        function copyToClipboard(url, cardElement) {
            navigator.clipboard.writeText(url).then(() => {
                cardElement.classList.add('copied');
                setTimeout(() => {
                    cardElement.classList.remove('copied');
                }, 1000);
            }).catch(err => {
                console.error('Помилка копіювання: ', err);
            });
        }
    </script>
</body>
</html>
