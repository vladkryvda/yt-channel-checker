<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official YouTube API Grabber</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #161616;
            --border-color: #262626;
            --text-primary: #f0f0f0;
            --text-secondary: #8c8c8c;
            --accent-color: #d4b295;
            --success-color: #8fb996;
            --font-mono: "Courier New", Courier, monospace;
        }

        body {
            font-family: var(--font-mono);
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px 180px 20px; /* Місце для полів знизу */
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 1200px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            aspect-ratio: 16 / 10;
            border: 1px solid var(--border-color);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), 
                        border-color 0.3s, 
                        box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
        }

        .thumbnail-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .thumbnail-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(65%) grayscale(20%);
            transition: filter 0.3s;
        }

        .card:hover .thumbnail-box img {
            filter: brightness(80%) grayscale(0%);
        }

        .scrim {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.3) 50%, rgba(0, 0, 0, 0.6) 100%);
            z-index: 1;
        }

        .video-title {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            font-size: 0.8rem;
            font-weight: normal;
            margin: 0;
            z-index: 2;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-date {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 0.7rem;
            color: var(--accent-color);
            z-index: 2;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 3px 8px;
            border-radius: 4px;
        }

        .copy-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 15, 15, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--success-color);
            opacity: 0;
            z-index: 3;
            transition: opacity 0.2s;
            text-align: center;
        }

        .card.copied .copy-overlay {
            opacity: 1;
        }

        /* Нижня панель керування */
        .controls-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 500px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .controls-panel input[type="text"] {
            width: 100%;
            background-color: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: var(--text-primary);
            padding: 10px 0;
            font-size: 0.85rem;
            font-family: var(--font-mono);
            outline: none;
            text-align: center;
            transition: border-bottom-color 0.3s;
        }

        .controls-panel input[type="text"]:focus {
            border-bottom-color: var(--accent-color);
        }

        .placeholder-text {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 100px;
            line-height: 1.8;
            width: 100%;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="grid" id="videoGrid">
            <div class="placeholder-text" id="placeholder">
                [ введіть ваш API Key та вставте url каналу в поля знизу ]
            </div>
        </div>
    </div>

    <!-- Нижня панель із полями вводу -->
    <div class="controls-panel">
        <input type="text" id="apiKey" placeholder="____________________ вставте сюди API KEY ____________________" autocomplete="off">
        <input type="text" id="channelUrl" placeholder="__________________ вставте url каналу або @юзернейм __________________" autocomplete="off">
    </div>

    <script>
        const apiKeyField = document.getElementById('apiKey');
        const inputField = document.getElementById('channelUrl');
        const grid = document.getElementById('videoGrid');
        let debounceTimer;

        // Зберігаємо API-ключ у браузері, щоб не вводити його щоразу
        if (localStorage.getItem('yt_api_key')) {
            apiKeyField.value = localStorage.getItem('yt_api_key');
        }

        apiKeyField.addEventListener('input', () => {
            localStorage.setItem('yt_api_key', apiKeyField.value.trim());
        });

        inputField.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const val = inputField.value.trim();
            const key = apiKeyField.value.trim();
            
            if (!key) {
                grid.innerHTML = '<div class="placeholder-text" style="color: var(--accent-color)">[ ПОМИЛКА: Будь ласка, вставте спочатку ваш Google API Key ]</div>';
                return;
            }

            if (val.length === 0) {
                grid.innerHTML = '<div class="placeholder-text">[ вставте url каналу або @юзернейм ]</div>';
                return;
            }

            grid.innerHTML = '<div class="placeholder-text">[ ОЧІКУВАННЯ ЗАВЕРШЕННЯ ВВОДУ... ]</div>';
            
            debounceTimer = setTimeout(() => {
                fetchVideosFromAPI(val, key);
            }, 500);
        });

        // Аналіз типу вводу (чи це посилання, @юзернейм чи прямий ID)
        function parseInput(input) {
            let clean = input.trim();
            
            // Якщо посилання з редиректу Google
            try {
                if (clean.includes('google.com')) {
                    const urlObj = new URL(clean);
                    const realUrl = urlObj.searchParams.get('url') || urlObj.searchParams.get('q');
                    if (realUrl) clean = realUrl;
                }
            } catch (e) {}

            const handleMatch = clean.match(/(@[a-zA-Z0-9._-]+)/);
            if (handleMatch) return { type: 'handle', value: handleMatch[1] };

            const idMatch = clean.match(/(UC[a-zA-Z0-9_-]{22})/);
            if (idMatch) return { type: 'id', value: idMatch[1] };

            // Спроба знайти просто назву або юзернейм
            if (clean.startsWith('http')) {
                const parts = clean.split('/');
                const lastPart = parts[parts.length - 1] || parts[parts.length - 2];
                if (lastPart.startsWith('@')) return { type: 'handle', value: lastPart };
                return { type: 'handle', value: '@' + lastPart };
            }

            return { type: 'handle', value: clean.startsWith('@') ? clean : '@' + clean };
        }

        async function fetchVideosFromAPI(input, key) {
            const parsed = parseInput(input);
            grid.innerHTML = '<div class="placeholder-text">[ КРОК 1: ОТРИМАННЯ ДАНИХ КАНАЛУ... ]</div>';

            try {
                let channelQueryUrl = '';
                if (parsed.type === 'handle') {
                    channelQueryUrl = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&forHandle=${encodeURIComponent(parsed.value)}&key=${key}`;
                } else if (parsed.type === 'id') {
                    channelQueryUrl = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${encodeURIComponent(parsed.value)}&key=${key}`;
                } else {
                    throw new Error("Нерозпізнаний формат вводу. Введіть @username або посилання.");
                }

                const channelRes = await fetch(channelQueryUrl);
                const channelData = await channelRes.json();

                if (channelData.error) {
                    throw new Error(channelData.error.message);
                }

                if (!channelData.items || channelData.items.length === 0) {
                    throw new Error("Канал не знайдено. Перевірте правильність імені.");
                }

                // Кожен канал на YouTube має системний плейлист "uploads", де зберігаються всі завантаження
                const uploadsPlaylistId = channelData.items[0].contentDetails.relatedPlaylists.uploads;

                grid.innerHTML = '<div class="placeholder-text">[ КРОК 2: ОТРИМАННЯ ОСТАННІХ ВІДЕО... ]</div>';

                // Запит на отримання останніх 6 елементів із плейлиста "uploads"
                const playlistQueryUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsPlaylistId}&maxResults=6&key=${key}`;
                const playlistRes = await fetch(playlistQueryUrl);
                const playlistData = await playlistRes.json();

                if (playlistData.error) {
                    throw new Error(playlistData.error.message);
                }

                const items = playlistData.items || [];
                if (items.length === 0) {
                    throw new Error("На каналі немає опублікованих відео.");
                }

                const videos = items.map(item => {
                    const videoId = item.snippet.resourceId.videoId;
                    return {
                        id: videoId,
                        title: `> ${item.snippet.title}`,
                        thumbnail: item.snippet.thumbnails?.medium?.url || `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
                        date: `[ ${formatDate(item.snippet.publishedAt)} ]`
                    };
                });

                renderVideos(videos);

            } catch (err) {
                grid.innerHTML = `<div class="placeholder-text" style="color: var(--accent-color)">[ API ERROR: ${err.message} ]</div>`;
            }
        }

        function formatDate(isoString) {
            if (!isoString) return "unknown";
            const date = new Date(isoString);
            return date.toLocaleDateString('uk-UA', { day: 'numeric', month: 'short' });
        }

        function renderVideos(videos) {
            grid.innerHTML = '';

            videos.forEach(video => {
                const videoUrl = `https://www.youtube.com/watch?v=${video.id}`;
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => copyToClipboard(videoUrl, card);

                card.innerHTML = `
                    <div class="copy-overlay">
                        +----------------------+<br>
                        |    [ COPIED URL ]    |<br>
                        +----------------------+
                    </div>
                    <div class="thumbnail-box">
                        <img src="${video.thumbnail}" alt="${video.title}">
                        <div class="scrim"></div>
                    </div>
                    <div class="video-date">${video.date}</div>
                    <h3 class="video-title">${video.title}</h3>
                `;
                grid.appendChild(card);
            });
        }

        function copyToClipboard(url, cardElement) {
            navigator.clipboard.writeText(url).then(() => {
                cardElement.classList.add('copied');
                setTimeout(() => {
                    cardElement.classList.remove('copied');
                }, 1000);
            }).catch(err => {
                console.error('Помилка копіювання: ', err);
            });
        }
    </script>
</body>
</html>
