<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>latest uploads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f4ef;
    --surface: #ffffff;
    --border: #e4e0d6;
    --border-hover: #cfc9ba;
    --text: #2b2a26;
    --text-dim: #8a8676;
    --text-faint: #b6b1a2;
    --accent: #6b7f5e;
    --error: #b56a5a;
    --font: "IBM Plex Mono", ui-monospace, "SF Mono", monospace;
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 56px 24px 80px;
    display: flex;
    justify-content: center;
    line-height: 1.5;
  }

  .wrapper { width: 100%; max-width: 900px; }

  .input-line {
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
    margin-bottom: 8px;
    transition: border-color 0.2s ease;
  }

  .input-line:focus-within { border-color: var(--accent); }

  #channelUrl {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    caret-color: var(--accent);
  }

  #channelUrl::placeholder { color: var(--text-faint); }

  .status {
    font-size: 12.5px;
    color: var(--text-dim);
    min-height: 18px;
    margin-bottom: 32px;
  }

  .status.err { color: var(--error); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
  }

  .card {
    cursor: pointer;
    position: relative;
  }

  .thumb-box {
    position: relative;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }

  .thumb-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
    display: block;
  }

  .card:hover .thumb-box { border-color: var(--border-hover); }
  .card:hover .thumb-box img { transform: scale(1.02); }

  .card-body {
    padding: 10px 2px 0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .video-title {
    margin: 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.45;
  }

  .video-date {
    font-size: 11.5px;
    color: var(--text-faint);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .copy-flash {
    position: absolute;
    inset: 0;
    border-radius: 6px;
    background: rgba(246, 244, 239, 0.94);
    border: 1px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12.5px;
    color: var(--accent);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
  }

  .card.copied .copy-flash { opacity: 1; }

  .placeholder {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--text-faint);
    font-size: 13px;
    padding: 60px 20px;
  }

  @media (max-width: 480px) {
    body { padding: 36px 16px 60px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="input-line">
    <input type="text" id="channelUrl" placeholder="@handle або посилання на канал" autocomplete="off" autofocus>
  </div>
  <div class="status" id="status"></div>

  <div class="grid" id="videoGrid">
    <div class="placeholder">введіть канал вище</div>
  </div>
</div>

<script>
  const API_ENDPOINT = "/api/videos";

  const inputField = document.getElementById('channelUrl');
  const grid = document.getElementById('videoGrid');
  const status = document.getElementById('status');
  let debounceTimer;

  inputField.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const val = inputField.value.trim();

    if (val.length === 0) {
      grid.innerHTML = '<div class="placeholder">введіть канал вище</div>';
      status.textContent = '';
      status.className = 'status';
      return;
    }

    debounceTimer = setTimeout(() => fetchVideos(val), 500);
  });

  async function fetchVideos(rawInput) {
    status.className = 'status';
    status.textContent = 'завантаження…';
    grid.innerHTML = '';

    try {
      const res = await fetch(`${API_ENDPOINT}?channel=${encodeURIComponent(rawInput)}`);
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'помилка запиту');
      if (!data.videos || data.videos.length === 0) throw new Error('відео не знайдено');

      renderVideos(data.videos);
      status.textContent = `${data.videos.length} відео · клік копіює посилання`;
    } catch (err) {
      grid.innerHTML = '';
      status.className = 'status err';
      status.textContent = err.message;
    }
  }

  function renderVideos(videos) {
    grid.innerHTML = '';
    videos.forEach(video => {
      const url = `https://www.youtube.com/watch?v=${video.id}`;
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <div class="thumb-box">
          <img src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy">
          <div class="copy-flash">посилання скопійовано</div>
        </div>
        <div class="card-body">
          <p class="video-title">${escapeHtml(video.title)}</p>
          <span class="video-date">${escapeHtml(video.date)}</span>
        </div>
      `;

      card.addEventListener('click', () => copyToClipboard(url, card));
      grid.appendChild(card);
    });
  }

  function copyToClipboard(url, card) {
    navigator.clipboard.writeText(url).then(() => {
      card.classList.add('copied');
      setTimeout(() => card.classList.remove('copied'), 1000);
    }).catch(err => console.error('copy failed', err));
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
