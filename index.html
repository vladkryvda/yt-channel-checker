<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>latest uploads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #F7F3EE;
    --surface: #FFFFFF;
    --border: #E5DCD3;
    --border-hover: #CFC2B4;
    --text: #2D2522;
    --text-dim: #7D7067;
    --text-faint: #B5A89E;
    --accent: #C4593C;
    --accent-hover: #AA472B;
    --accent-soft: #F5EBE6;
    --error: #B34A3B;
    --font: "IBM Plex Mono", ui-monospace, "SF Mono", monospace;
    --serif: "Fraunces", Georgia, serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    padding: 60px 24px 100px;
    display: flex;
    justify-content: center;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrapper { width: 100%; max-width: 920px; }

  /* Minimalist Header */
  .header {
    margin-bottom: 24px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .title {
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  /* Sleek Unified Search Bar */
  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 6px 6px 16px;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(196, 89, 60, 0.1);
  }

  .search-icon {
    color: var(--text-faint);
    flex-shrink: 0;
  }

  #searchInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14.5px;
    padding: 8px 0;
    caret-color: var(--accent);
  }

  #searchInput::placeholder { color: var(--text-faint); }

  .clear-btn {
    background: transparent;
    border: none;
    color: var(--text-faint);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s ease;
  }

  .clear-btn:hover { color: var(--text); }

  .search-btn {
    background: var(--accent);
    color: #FFFFFF;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s ease, transform 0.1s ease;
  }

  .search-btn:hover { background: var(--accent-hover); }
  .search-btn:active { transform: scale(0.98); }

  /* Status Line */
  .status {
    font-size: 12px;
    color: var(--text-dim);
    min-height: 18px;
    margin: 10px 4px 28px;
  }

  .status.err { color: var(--error); }

  /* Video Grid Layout */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 22px;
  }

  .card {
    cursor: pointer;
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }

  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }

  .thumb-box {
    position: relative;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 11px;
    background: var(--accent-soft);
  }

  .thumb-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.35s ease;
    display: block;
  }

  .card:hover .thumb-box img { transform: scale(1.03); }

  .duration-badge {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(45, 37, 34, 0.85);
    color: #FFF;
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 4px;
    backdrop-filter: blur(2px);
  }

  .card-body {
    padding: 12px 4px 4px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .video-title {
    margin: 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text-dim);
  }

  .channel-name {
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }

  .copy-flash {
    position: absolute;
    inset: 10px 10px auto 10px;
    aspect-ratio: 16 / 9;
    border-radius: 11px;
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
  }

  .card.copied .copy-flash { opacity: 1; }

  /* Skeletons */
  .skeleton-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px;
  }

  .skeleton-thumb {
    aspect-ratio: 16 / 9;
    border-radius: 11px;
    background: linear-gradient(90deg, var(--border) 25%, var(--accent-soft) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: skeleton-pulse 1.4s infinite;
  }

  .skeleton-line {
    height: 12px;
    border-radius: 4px;
    background: var(--border);
    margin-top: 10px;
    animation: skeleton-pulse 1.4s infinite;
  }

  .skeleton-line.short { width: 50%; }

  @keyframes skeleton-pulse {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .placeholder {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--text-faint);
    font-size: 13px;
    padding: 80px 20px;
  }

  .load-more-row {
    display: flex;
    justify-content: center;
    margin-top: 36px;
  }

  #loadMoreBtn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
  }

  #loadMoreBtn:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }

  #loadMoreBtn:disabled {
    opacity: 0.45;
    cursor: default;
  }

  @media (max-width: 480px) {
    body { padding: 40px 16px 70px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <header class="header">
    <h1 class="title">latest uploads</h1>
  </header>

  <!-- Search Input Container -->
  <div class="search-box">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" id="searchInput" placeholder="Paste link, @handle, or enter search keywords..." autocomplete="off" autofocus>
    <button id="clearBtn" class="clear-btn" style="display:none;" title="Clear input">&times;</button>
    <button id="searchBtn" class="search-btn">Search</button>
  </div>

  <div class="status" id="status"></div>

  <!-- Video Grid Container -->
  <div class="grid" id="videoGrid">
    <div class="placeholder">enter search terms, channel link or @handle above</div>
  </div>

  <!-- Load More Button -->
  <div class="load-more-row" id="loadMoreRow" style="display:none;">
    <button id="loadMoreBtn" title="Load more">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>
  </div>
</div>

<script>
  const API_ENDPOINT = "/api/videos";

  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const clearBtn = document.getElementById('clearBtn');
  const grid = document.getElementById('videoGrid');
  const status = document.getElementById('status');
  const loadMoreRow = document.getElementById('loadMoreRow');
  const loadMoreBtn = document.getElementById('loadMoreBtn');

  let debounceTimer = null;
  let activeQuery = '';
  let activeIsChannel = false;
  let nextPageToken = null;
  let totalLoaded = 0;

  // Detects if string is a URL, channel ID, or @handle
  function isLinkOrHandle(str) {
    const val = str.trim();
    if (!val) return false;
    if (val.startsWith('@')) return true;
    if (val.includes('youtube.com') || val.includes('youtu.be')) return true;
    if (val.startsWith('http://') || val.startsWith('https://')) return true;
    if (val.startsWith('UC') && val.length === 24) return true;
    return false;
  }

  // Handle Input Changes
  searchInput.addEventListener('input', () => {
    const val = searchInput.value.trim();
    clearBtn.style.display = val.length > 0 ? 'flex' : 'none';

    if (val.length === 0) {
      clearTimeout(debounceTimer);
      resetState();
      grid.innerHTML = '<div class="placeholder">enter search terms, channel link or @handle above</div>';
      return;
    }

    const isLink = isLinkOrHandle(val);

    if (isLink) {
      // Auto-trigger for links or @handles without needing to click Search button
      clearTimeout(debounceTimer);
      status.className = 'status';
      status.textContent = 'link or @handle detected — searching...';
      debounceTimer = setTimeout(() => {
        startSearch(val, true);
      }, 400);
    } else {
      // For keyword search, clear any auto-timers (requires Search click or Enter)
      clearTimeout(debounceTimer);
      status.className = 'status';
      status.textContent = 'press Enter or click Search';
    }
  });

  // Handle Paste Event (Instant auto-detection on paste)
  searchInput.addEventListener('paste', () => {
    setTimeout(() => {
      const val = searchInput.value.trim();
      if (isLinkOrHandle(val)) {
        clearTimeout(debounceTimer);
        startSearch(val, true);
      }
    }, 50);
  });

  // Clear button click
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    clearBtn.style.display = 'none';
    clearTimeout(debounceTimer);
    resetState();
    grid.innerHTML = '<div class="placeholder">enter search terms, channel link or @handle above</div>';
    searchInput.focus();
  });

  // Manual Trigger via Button or Enter Key
  searchBtn.addEventListener('click', () => submitManualSearch());

  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      submitManualSearch();
    }
  });

  // Shortcut key: Cmd+K or Ctrl+K or '/' to focus search input
  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
    }
  });

  loadMoreBtn.addEventListener('click', () => {
    if (activeQuery && nextPageToken) {
      fetchVideos(activeQuery, activeIsChannel, nextPageToken, true);
    }
  });

  function submitManualSearch() {
    const val = searchInput.value.trim();
    if (!val) return;
    clearTimeout(debounceTimer);
    startSearch(val, isLinkOrHandle(val));
  }

  function resetState() {
    activeQuery = '';
    activeIsChannel = false;
    nextPageToken = null;
    totalLoaded = 0;
    loadMoreRow.style.display = 'none';
    status.textContent = '';
    status.className = 'status';
  }

  function startSearch(query, isChannel) {
    activeQuery = query;
    activeIsChannel = isChannel;
    nextPageToken = null;
    totalLoaded = 0;
    fetchVideos(query, isChannel, null, false);
  }

  async function fetchVideos(rawInput, isChannel, pageToken, append) {
    status.className = 'status';
    status.textContent = 'loading…';
    
    if (!append) renderSkeletons();
    loadMoreBtn.disabled = true;

    try {
      // Backend request with auto-detected channel or keyword search parameter
      const paramName = isChannel ? 'channel' : 'q';
      let url = `${API_ENDPOINT}?${paramName}=${encodeURIComponent(rawInput)}`;
      if (pageToken) url += `&pageToken=${encodeURIComponent(pageToken)}`;

      const res = await fetch(url);
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Request failed');

      if (!data.videos || data.videos.length === 0) {
        if (!append) grid.innerHTML = '<div class="placeholder">no videos found</div>';
        status.textContent = 'no videos found';
      } else {
        renderVideos(data.videos, append);
        totalLoaded += data.videos.length;
        status.textContent = `${totalLoaded} videos · click card to copy link`;
      }

      nextPageToken = data.nextPageToken || null;
      loadMoreRow.style.display = nextPageToken ? 'flex' : 'none';

    } catch (err) {
      if (!append) grid.innerHTML = '';
      status.className = 'status err';
      status.textContent = err.message || 'error fetching videos';
    } finally {
      loadMoreBtn.disabled = false;
    }
  }

  function renderVideos(videos, append) {
    if (!append) grid.innerHTML = '';

    videos.forEach(video => {
      // Constructing clean YouTube URL
      const videoUrl = `https://www.youtube.com/watch?v=${video.id}`;
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <div class="thumb-box">
          <img src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy">
          ${video.duration ? `<span class="duration-badge">${escapeHtml(video.duration)}</span>` : ''}
          <div class="copy-flash">link copied</div>
        </div>
        <div class="card-body">
          <p class="video-title" title="${escapeHtml(video.title)}">${escapeHtml(video.title)}</p>
          <div class="meta-row">
            <span class="channel-name">${escapeHtml(video.channelTitle || '')}</span>
            <span>${timeAgo(video.date)}</span>
          </div>
        </div>
      `;

      card.addEventListener('click', () => copyToClipboard(videoUrl, card));
      grid.appendChild(card);
    });
  }

  function renderSkeletons() {
    grid.innerHTML = '';
    for (let i = 0; i < 6; i++) {
      const skel = document.createElement('div');
      skel.className = 'skeleton-card';
      skel.innerHTML = `
        <div class="skeleton-thumb"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line short"></div>
      `;
      grid.appendChild(skel);
    }
  }

  function timeAgo(dateString) {
    const date = new Date(dateString);
    if (isNaN(date)) return '';
    const seconds = Math.floor((new Date() - date) / 1000);

    let interval = seconds / 31536000;
    if (interval >= 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " year ago" : " years ago");
    interval = seconds / 2592000;
    if (interval >= 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " month ago" : " months ago");
    interval = seconds / 604800;
    if (interval >= 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " week ago" : " weeks ago");
    interval = seconds / 86400;
    if (interval >= 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " day ago" : " days ago");
    interval = seconds / 3600;
    if (interval >= 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " hour ago" : " hours ago");
    interval = seconds / 60;
    if (interval >= 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " minute ago" : " minutes ago");
    return "just now";
  }

  function copyToClipboard(url, card) {
    navigator.clipboard.writeText(url).then(() => {
      card.classList.add('copied');
      setTimeout(() => card.classList.remove('copied'), 1000);
    }).catch(err => console.error('copy failed', err));
  }

  function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
