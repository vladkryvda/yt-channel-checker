<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>latest uploads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4EFE6;
    --surface: #FBF8F1;
    --border: #E6DCC9;
    --border-hover: #D6C6A8;
    --text: #3B362B;
    --text-dim: #8C8371;
    --text-faint: #B8AD97;
    --accent: #BC6C4A;
    --accent-soft: #E7D9C6;
    --error: #A75C48;
    --font: "IBM Plex Mono", ui-monospace, "SF Mono", monospace;
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 64px 24px 100px;
    display: flex;
    justify-content: center;
    line-height: 1.5;
  }

  .wrapper { width: 100%; max-width: 920px; }

  .input-line {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 10px;
    transition: border-color 0.2s ease;
  }

  .input-line:focus-within { border-color: var(--accent); }

  #channelUrl {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    caret-color: var(--accent);
  }

  #channelUrl::placeholder { color: var(--text-faint); }

  .status {
    font-size: 12.5px;
    color: var(--text-dim);
    min-height: 18px;
    margin: 10px 4px 32px;
  }

  .status.err { color: var(--error); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
  }

  .card {
    cursor: pointer;
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 10px;
    transition: border-color 0.2s ease, transform 0.15s ease;
  }

  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }

  .thumb-box {
    position: relative;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 12px;
    background: var(--accent-soft);
  }

  .thumb-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.35s ease;
    display: block;
  }

  .card:hover .thumb-box img { transform: scale(1.03); }

  .card-body {
    padding: 12px 6px 4px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start; /* Змінено для правильного позиціонування багаторядкової дати */
    gap: 12px;
  }

  .video-title {
    margin: 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.45;
  }

  /* Обгортка для дати та відносного часу */
  .date-wrapper {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .video-date {
    font-size: 11.5px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .video-time-ago {
    font-size: 10px; /* Зменшений текст */
    color: var(--text-faint);
    white-space: nowrap;
    margin-top: 2px;
  }

  .copy-flash {
    position: absolute;
    inset: 10px 10px auto 10px;
    aspect-ratio: 16 / 9;
    border-radius: 12px;
    background: rgba(251, 248, 241, 0.95);
    border: 1px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12.5px;
    color: var(--accent);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
  }

  .card.copied .copy-flash { opacity: 1; }

  .placeholder {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--text-faint);
    font-size: 13px;
    padding: 60px 20px;
  }

  .load-more-row {
    display: flex;
    justify-content: center;
    margin-top: 36px;
  }

  /* Мінімалістична кругла кнопка з шевроном */
  #loadMoreBtn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.2s ease, color 0.2s ease;
  }

  #loadMoreBtn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  #loadMoreBtn:disabled {
    opacity: 0.45;
    cursor: default;
  }

  @media (max-width: 480px) {
    body { padding: 40px 16px 70px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="input-line">
    <input type="text" id="channelUrl" placeholder="@handle or channel link" autocomplete="off" autofocus>
  </div>
  <div class="status" id="status"></div>

  <div class="grid" id="videoGrid">
    <div class="placeholder">enter channel above</div>
  </div>

  <div class="load-more-row" id="loadMoreRow" style="display:none;">
    <button id="loadMoreBtn" title="Load more">
      <!-- Мінімалістична іконка стрілочки вниз -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>
  </div>
</div>

<script>
  const API_ENDPOINT = "/api/videos";

  const inputField = document.getElementById('channelUrl');
  const grid = document.getElementById('videoGrid');
  const status = document.getElementById('status');
  const loadMoreRow = document.getElementById('loadMoreRow');
  const loadMoreBtn = document.getElementById('loadMoreBtn');

  let debounceTimer;
  let currentChannelInput = null;
  let nextPageToken = null;
  let totalLoaded = 0;

  inputField.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const val = inputField.value.trim();

    if (val.length === 0) {
      resetState();
      grid.innerHTML = '<div class="placeholder">enter channel above</div>';
      return;
    }

    debounceTimer = setTimeout(() => startSearch(val), 500);
  });

  loadMoreBtn.addEventListener('click', () => {
    if (currentChannelInput && nextPageToken) {
      fetchVideos(currentChannelInput, nextPageToken, true);
    }
  });

  function resetState() {
    currentChannelInput = null;
    nextPageToken = null;
    totalLoaded = 0;
    loadMoreRow.style.display = 'none';
    status.textContent = '';
    status.className = 'status';
  }

  function startSearch(val) {
    currentChannelInput = val;
    nextPageToken = null;
    totalLoaded = 0;
    fetchVideos(val, null, false);
  }

  async function fetchVideos(rawInput, pageToken, append) {
    status.className = 'status';
    status.textContent = 'loading…';
    if (!append) grid.innerHTML = '';
    loadMoreBtn.disabled = true;

    try {
      let url = `${API_ENDPOINT}?channel=${encodeURIComponent(rawInput)}`;
      if (pageToken) url += `&pageToken=${encodeURIComponent(pageToken)}`;

      const res = await fetch(url);
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'request error');
      if (!data.videos || data.videos.length === 0) {
        if (!append) throw new Error('no videos found');
      } else {
        renderVideos(data.videos, append);
        totalLoaded += data.videos.length;
      }

      nextPageToken = data.nextPageToken || null;
      loadMoreRow.style.display = nextPageToken ? 'flex' : 'none';
      loadMoreBtn.disabled = false;

      status.textContent = `${totalLoaded} videos · click copies link`;
    } catch (err) {
      if (!append) grid.innerHTML = '';
      status.className = 'status err';
      status.textContent = err.message;
      loadMoreBtn.disabled = false;
    }
  }

  function renderVideos(videos, append) {
    if (!append) grid.innerHTML = '';
    videos.forEach(video => {
      // Виправлено синтаксис та формування лінку
      const url = `https://youtube.com/watch?v=${video.id}`;
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <div class="thumb-box">
          <img src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy">
          <div class="copy-flash">link copied</div>
        </div>
        <div class="card-body">
          <p class="video-title">${escapeHtml(video.title)}</p>
          <div class="date-wrapper">
            <span class="video-date">${escapeHtml(video.date)}</span>
            <span class="video-time-ago">${timeAgo(video.date)}</span>
          </div>
        </div>
      `;

      card.addEventListener('click', () => copyToClipboard(url, card));
      grid.appendChild(card);
    });
  }

  // Функція для обчислення часу, як на YouTube
  function timeAgo(dateString) {
    const date = new Date(dateString);
    if (isNaN(date)) return ''; // Якщо дата не розпізнана
    
    const seconds = Math.floor((new Date() - date) / 1000);
    
    let interval = seconds / 31536000;
    if (Math.floor(interval) >= 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " year ago" : " years ago");
    
    interval = seconds / 2592000;
    if (Math.floor(interval) >= 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " month ago" : " months ago");
    
    interval = seconds / 604800;
    if (Math.floor(interval) >= 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " week ago" : " weeks ago");
    
    interval = seconds / 86400;
    if (Math.floor(interval) >= 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " day ago" : " days ago");
    
    interval = seconds / 3600;
    if (Math.floor(interval) >= 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " hour ago" : " hours ago");
    
    interval = seconds / 60;
    if (Math.floor(interval) >= 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " minute ago" : " minutes ago");
    
    return Math.floor(seconds) + (Math.floor(seconds) === 1 ? " second ago" : " seconds ago");
  }

  function copyToClipboard(url, card) {
    navigator.clipboard.writeText(url).then(() => {
      card.classList.add('copied');
      setTimeout(() => card.classList.remove('copied'), 1000);
    }).catch(err => console.error('copy failed', err));
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
